# Wispr-MR configuration
# Modify and restart the app to apply changes.
#
# PROFILS DE VITESSE — surcharge automatiquement la section stt ci-dessous.
# La transcription tourne en STREAMING (l'audio est transcrit PENDANT que vous
# parlez) : au relâchement du micro, il ne reste qu'une courte fin à traiter,
# d'où une latence perçue très faible. Le polish LLM est appliqué EN ARRIÈRE-PLAN
# (le texte brut est inséré tout de suite, puis remplacé par la version polie).
# Mesuré sur CE CPU (i7-1355U) : seul 'base' tient l'objectif ≤1s. 'small' fait
# ~2,5-3s rien que pour la fin de phrase → au-dessus de 1s. 'turbo' ~8s+.
#   fast     : Whisper base  + LLM 1.5b → ≤1s, insertion instantanée (DÉFAUT)
#   balanced : Whisper small + LLM 1.5b → ~2-3s, meilleure précision brute
#   quality  : Whisper turbo + LLM 3b   → précision max, mais LENT (~8s+)
# Le polish LLM s'exécute en arrière-plan et corrige le texte ~1s après : il
# rattrape une bonne part de la précision de 'base' sans coût de latence perçu.
# Surcharge possible en CLI : python app.py --profile fast
# L'activation du polish, le profil et la langue se règlent AUSSI en direct
# depuis le panneau de l'overlay (survolez la pastille en bas de l'écran).
profile: "balanced"

hotkey: "ctrl+space"           # Push-to-talk combination (hold)

audio:
  sample_rate: 16000           # Hz — must be 16000 for Whisper
  preroll_ms: 500              # ms of audio captured before hotkey press
  max_record_s: 120            # Safety cutoff in seconds
  device:                      # null = system default input device

stt:
  model: "base"                # base = seul modèle ≤1s sur ce CPU (small ~3s)
  compute_type: "int8"         # int8 = fastest CPU inference
  cpu_threads: 0               # 0 = auto-detect (tous les threads logiques)
  language: fr                 # null = auto ; "fr" / "en" pour fiabiliser (réglable à chaud)
  beam_size: 1                 # Lower = faster; 1 is sufficient for dictation
  best_of: 1
  streaming: true              # transcrit pendant l'enregistrement → latence ↓↓

llm:
  enabled: false
  provider: "ollama"           # Only provider supported
  base_url: "http://localhost:11434"
  model: "qwen2.5:3b-instruct-q4_K_M"
  fallback_model: "qwen2.5:1.5b-instruct-q4_K_M"
  timeout_s: 8                 # Fallback to raw Whisper text if exceeded
  min_chars_for_polish: 15     # Short clips skip LLM polish entirely
  keep_alive: -1               # -1 = keep model in RAM indefinitely
  num_predict: 256             # Token cap (dictée = phrases courtes → plus rapide)
  temperature: 0.2

injection:
  method: "clipboard"          # clipboard | type
  two_pass_insertion: false    # Inject raw text first, then polish (fragile)
  paste_delay_ms: 30           # Delay before Ctrl+V (some apps need more)

ui:
  overlay: true                # Show floating recording indicator
  tray: true                   # Show system tray icon

logging:
  level: "INFO"                # DEBUG | INFO | WARNING | ERROR
  file: "logs/app.log"
  rotation: "10 MB"
  retention: "7 days"
